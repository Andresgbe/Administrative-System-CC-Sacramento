<div class="login-wrapper">

  <div class="login-card">

    <div class="login-header">
      <div class="logo">
        <h1>CC Carrizal</h1>
      </div>
      <p class="subtitle">Sistema Administrativo</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="field-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@carrizal.com"
          [class.invalid]="email?.invalid && email?.touched"
        />
        <span class="error-msg" *ngIf="email?.invalid && email?.touched">
          Ingresa un correo válido
        </span>
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            [class.invalid]="password?.invalid && password?.touched"
          />
          <button type="button" class="toggle-pass" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="error-msg" *ngIf="password?.invalid && password?.touched">
          Mínimo 6 caracteres
        </span>
      </div>

      <div class="error-banner" *ngIf="errorMsg">
